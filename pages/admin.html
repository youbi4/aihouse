<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AI House UHBC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <a href="/pages/homepage.html" class="logo">
                    <img src="/assets/aihouse_logo.svg" alt="AI House Logo" class="logo-header">
                </a>

                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                
                <ul class="nav-links">
                    <li><a href="/pages/homepage.html">Home</a></li>
                    <li><a href="/pages/contact.html">Contact</a></li>
                </ul>
                <div id="header-actions"></div>
                <img src="/assets/uhbc_logo.svg" alt="UHBC Logo" class="logo-header">
            </div>
        </nav>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage members and events</p>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-icon members-icon">👥</div>
                <div class="stat-info">
                    <h3>Total Members</h3>
                    <p id="totalMembers">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon events-icon">📅</div>
                <div class="stat-info">
                    <h3>Total Events</h3>
                    <p id="totalEvents">0</p>
                </div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="members">Members Management</button>
            <button class="tab-btn" data-tab="events">Events Management</button>
        </div>

        <!-- Members Tab -->
        <div class="tab-content active" id="members-tab">
            <div class="section-header">
                <h2>All Members</h2>
                <div class="search-box">
                    <input type="text" id="memberSearch" placeholder="Search members...">
                </div>
            </div>

            <div class="table-container">
                <table class="members-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="membersTableBody">
                        <tr><td colspan="6" style="text-align: center; padding: 20px;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Events Tab -->
        <div class="tab-content" id="events-tab">
            <div class="section-header">
                <h2>All Events</h2>
                <button class="btn btn-primary" id="addEventBtn">+ Add New Event</button>
            </div>

            <div id="addEventForm" class="event-form hidden">
                <h3>Create New Event</h3>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">Event Title</label>
                        <input type="text" id="eventTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="eventDescription">Description</label>
                        <textarea id="eventDescription" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="eventDate">Date</label>
                        <input type="datetime-local" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="eventLocation">Location</label>
                        <input type="text" id="eventLocation" required>
                    </div>
                    <div class="form-group">
                        <label for="eventCategory">Category</label>
                        <select id="eventCategory" required>
                            <option value="">Select Category</option>
                            <option value="Training">Training</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Innovation">Innovation</option>
                            <option value="Research">Research</option>
                            <option value="Ethics">Ethics</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Create Event</button>
                        <button type="button" class="btn btn-secondary" id="cancelEventBtn">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="events-grid" id="eventsGrid">
                <p style="text-align: center; padding: 40px;">Loading events...</p>
            </div>
        </div>
    </main>

    <!-- Role Change Modal -->
    <div id="roleModal" class="modal hidden">
        <div class="modal-content">
            <h2>Change Member Role</h2>
            <div class="form-group">
                <label for="newRole">Select New Role</label>
                <select id="newRole">
                    <option value="">Select Role</option>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Researcher">Researcher</option>
                    <option value="Entrepreneur">Entrepreneur</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" id="confirmRoleBtn">Confirm</button>
                <button class="btn btn-secondary" id="cancelRoleBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin="anonymous"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
